general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    # lock_cmd = playerctl --all-players pause && pidof hyprlock || hyprlock -c ~/.config/niri/hyprlock.conf  # pause all system audio and avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = wlr-dpms on               # to avoid having to press a key twice to turn on the display.
}

listener {
    timeout = 300                                             # 5min.
    on-timeout = ~/.config/niri/scripts/brightness.sh dim     # dim monitor backlight
    on-resume = ~/.config/niri/scripts/brightness.sh restore  # monitor backlight restore
}

listener {
    timeout = 600                                 # 10min
    on-timeout = wlr-dpms off                     # screen off when timeout has passed
    on-resume = wlr-dpms on && ~/.config/niri/scripts/brightness.sh restore  # screen on when activity is detected after timeout has fired.
}

listener {
    timeout = 1800                                # 30min
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

listener {
    timeout = 2100                                # 35min
    on-timeout = systemctl suspend                # suspend pc
}
